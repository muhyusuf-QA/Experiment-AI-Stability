name: Playwright Nightly Tests

on:
  schedule:
    # 01:00 WIB = 18:00 UTC hari sebelumnya
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  iteration_1:
    name: Iteration 1
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CI: true
      PW_HEADLESS: 'true'
      PW_ITERATION_START: '1'
      PW_ITERATION_END: '1'
      ASKLUMIA_EMAIL: ${{ secrets.ASKLUMIA_EMAIL }}
      ASKLUMIA_PASSWORD: ${{ secrets.ASKLUMIA_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$ASKLUMIA_EMAIL" || { echo "Missing secret: ASKLUMIA_EMAIL"; exit 1; }
          test -n "$ASKLUMIA_PASSWORD" || { echo "Missing secret: ASKLUMIA_PASSWORD"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright login suite
        run: npm run test:login

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-iteration-1
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-iteration-1
          path: test-results/
          retention-days: 30

