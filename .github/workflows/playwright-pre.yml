name: Playwright Prerelease Nightly Tests

on:
  workflow_dispatch:

jobs:
  login_pre_suite:
    name: Login Pre Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CI: true
      PW_HEADLESS: 'true'
      PW_ITERATION_START: '1'
      PW_ITERATION_END: '1'
      ASKLUMIA_PRE_EMAIL: ${{ secrets.ASKLUMIA_PRE_EMAIL }}
      ASKLUMIA_PRE_PASSWORD: ${{ secrets.ASKLUMIA_PRE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "$ASKLUMIA_PRE_EMAIL" || { echo "Missing secret: ASKLUMIA_PRE_EMAIL"; exit 1; }
          test -n "$ASKLUMIA_PRE_PASSWORD" || { echo "Missing secret: ASKLUMIA_PRE_PASSWORD"; exit 1; }

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright prerelease login suite
        run: npm run test:login:pre

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-login-pre
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-results-login-pre
          path: test-results/
          retention-days: 30
